[[permission]]
identifier = "allow-generate-qr"
description = "Permite generar códigos QR"
commands.allow = ["generate_qr"]

[[permission]]
identifier = "allow-remove-white-background"
description = "Permite quitar fondo blanco"
commands.allow = ["remove_white_background"]

[[permission]]
identifier = "allow-image-converter"
description = "Permite convertir imágenes"
commands.allow = ["image_converter"]

[[permission]]
identifier = "allow-image-resizer"
description = "Permite redimensionar imágenes"
commands.allow = ["image_resizer"]

[[permission]]
identifier = "allow-pdf-tools"
description = "Permite procesar documentos PDF seleccionados"
commands.allow = ["pdf_tools"]

[[permission]]
identifier = "allow-video-converter"
description = "Permite convertir audio y video con FFmpeg"
commands.allow = ["video_converter", "ffmpeg_available"]

[[permission]]
identifier = "allow-batch-renamer"
description = "Permite renombrar los archivos seleccionados"
commands.allow = ["batch_renamer"]

[[permission]]
identifier = "allow-image-compressor"
description = "Permite comprimir imágenes seleccionadas por lotes"
commands.allow = ["image_compressor"]

[[permission]]
identifier = "allow-read-text-file"
description = "Permite leer el archivo de texto seleccionado para compararlo"
commands.allow = ["read_text_file"]

[[permission]]
identifier = "allow-convert-document"
description = "Permite convertir Markdown, HTML y texto localmente"
commands.allow = ["convert_document"]

[[permission]]
identifier = "allow-local-ocr"
description = "Permite extraer texto localmente de imágenes y PDF seleccionados"
commands.allow = ["ocr_runtime", "extract_text_ocr"]

[[permission]]
identifier = "allow-advanced-pdf-optimizer"
description = "Permite optimizar PDF localmente con Ghostscript"
commands.allow = ["pdf_optimizer_runtime", "optimize_pdf_advanced"]

[[permission]]
identifier = "allow-local-transcription"
description = "Permite transcribir audio o video localmente con Whisper"
commands.allow = ["transcription_runtime", "transcribe_local_audio"]

[[permission]]
identifier = "allow-plugin-system"
description = "Permite auditar plugins locales y sus permisos declarados"
commands.allow = ["plugin_system_status", "scan_local_plugins"]

[[permission]]
identifier = "allow-media-downloader"
description = "Permite descargar medios cuando el usuario confirma que tiene permiso"
commands.allow = ["media_downloader_runtime", "download_permitted_media"]

[[permission]]
identifier = "allow-ai-background"
description = "Permite quitar fondos con IA local usando rembg"
commands.allow = ["ai_background_runtime", "remove_background_ai"]

[[permission]]
identifier = "allow-dependency-center"
description = "Permite verificar dependencias locales de herramientas avanzadas"
commands.allow = ["dependency_center_status"]

[[permission]]
identifier = "allow-resource-manager"
description = "Permite revisar y abrir carpetas locales de recursos empaquetables"
commands.allow = ["resource_manager_status", "open_resource_folder"]

[[permission]]
identifier = "allow-file-actions"
description = "Permite abrir o revelar archivos generados por la app"
commands.allow = ["open_path", "reveal_path", "write_text_output"]
