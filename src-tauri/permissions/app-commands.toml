[[permission]]
identifier = "allow-generate-qr"
description = "Permite generar códigos QR"
commands.allow = ["generate_qr"]

[[permission]]
identifier = "allow-remove-white-background"
description = "Permite quitar fondo blanco"
commands.allow = ["remove_white_background"]

[[permission]]
identifier = "allow-image-converter"
description = "Permite convertir imágenes"
commands.allow = ["image_converter"]

[[permission]]
identifier = "allow-image-resizer"
description = "Permite redimensionar imágenes"
commands.allow = ["image_resizer"]

[[permission]]
identifier = "allow-pdf-tools"
description = "Permite procesar documentos PDF seleccionados"
commands.allow = ["pdf_tools"]

[[permission]]
identifier = "allow-video-converter"
description = "Permite convertir audio y video con FFmpeg"
commands.allow = ["video_converter", "ffmpeg_available"]

[[permission]]
identifier = "allow-batch-renamer"
description = "Permite renombrar los archivos seleccionados"
commands.allow = ["batch_renamer"]
